spring.application.name=hackathon-backend
server.port=8080

# Database Configuration (update for your environment)
spring.datasource.url=jdbc:mysql://localhost:3306/hackathon_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# 让 data.sql 在 JPA 建表之后执行
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT (change in production)
hackathon.jwt.secret=your-256-bit-secret-key-for-jwt-signing-please-change-me
hackathon.jwt.expiration=86400000

# File Upload
file.upload-dir=uploads
file.max-size=52428800
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Static resources - serve uploaded files
spring.web.resources.static-locations=classpath:/static/,file:uploads/
